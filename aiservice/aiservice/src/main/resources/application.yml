spring:
  config:
    import: optional:file:../../.env[.properties]
  application:
    name: ai-service
  mongodb:
    uri: ${MONGODB_URI}
    database: fitnessRecommendations
  rabbitmq:
    uri: ${RABBITMQ_URI}
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER_URI}

server:
  port: 8083

eureka:
  client:
    serviceUrl:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka/}
  instance:
    prefer-ip-address: true

rabbitmq:
  exchange:
    name: fitness.exchange
  queue:
    name: activity.queue
  routing:
    key: activity.routing

gemini:
  api:
    key: ${GEMINI_API_KEY}